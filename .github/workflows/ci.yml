name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Install Aiken
        run: |
          set -euo pipefail
          AIKEN_VERSION="v1.1.21"
          TRIPLE="x86_64-unknown-linux-musl"
          curl -sSL "https://github.com/aiken-lang/aiken/releases/download/${AIKEN_VERSION}/aiken-${TRIPLE}.tar.gz" -o /tmp/aiken.tgz
          tar -xzf /tmp/aiken.tgz -C /tmp
          sudo mv "/tmp/aiken-${TRIPLE}/aiken" /usr/local/bin/aiken
          aiken --version
