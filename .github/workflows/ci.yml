name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            evm/package-lock.json
            cardano/ts/package-lock.json

      - name: Install Aiken
        run: |
          set -euo pipefail
          AIKEN_VERSION="v1.1.21"
          TRIPLE="x86_64-unknown-linux-musl"
          curl -sSL "https://github.com/aiken-lang/aiken/releases/download/${AIKEN_VERSION}/aiken-${TRIPLE}.tar.gz" -o /tmp/aiken.tgz
          tar -xzf /tmp/aiken.tgz -C /tmp
          sudo mv "/tmp/aiken-${TRIPLE}/aiken" /usr/local/bin/aiken
          aiken --version

      - name: npm ci (workspace root)
        run: npm ci

      - name: Typecheck Midnight contract
        run: npm run typecheck -w @zk-stables/midnight-contract

      - name: Typecheck relayer
        run: npm run typecheck -w @zk-stables/relayer

      - name: Typecheck UI
        run: npm run typecheck -w @zk-stables/ui

      - name: npm ci + test (EVM)
        working-directory: evm
        env:
          CI: "true"
        run: |
          npm ci
          mkdir -p test-results
          npm test

      - name: Aiken check (Cardano validators)
        working-directory: cardano/aiken
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/test-results"
          set -o pipefail
          aiken check 2>&1 | tee "${GITHUB_WORKSPACE}/test-results/aiken-check.log"

      - name: npm ci + typecheck (Cardano TypeScript)
        working-directory: cardano/ts
        run: |
          npm ci
          npm run typecheck

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            evm/test-results/junit-evm.xml
            test-results/aiken-check.log
          if-no-files-found: warn
